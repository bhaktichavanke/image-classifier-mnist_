<!DOCTYPE html>
<html>
<head>
    <title>AI Digit Classifier</title>
</head>

<body style="
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0f172a;
    font-family:sans-serif;
    color:white;
">

<div style="
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    text-align:center;
">

<h2> AI Digit Classifier</h2>
<p style="color:#94a3b8;">Write any number between 0 and 9</p>

<canvas id="canvas" width="280" height="280"
style="border:2px solid #38bdf8; border-radius:10px;"></canvas>

<br><br>

<button onclick="predict()" style="padding:10px 20px; margin:5px;">
Predict
</button>

<button onclick="clearCanvas()" style="padding:10px 20px; margin:5px;">
Clear
</button>

<h3 id="result"></h3>
<p id="accuracy" style="color:#22c55e;"></p>

</div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

// black background
ctx.fillStyle = "black";
ctx.fillRect(0, 0, canvas.width, canvas.height);

let drawing = false;

canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => drawing = false;

canvas.onmousemove = (e) => {
    if (!drawing) return;

    ctx.fillStyle = "white";
    ctx.beginPath();

    //  thinner brush (IMPORTANT)
    ctx.arc(e.offsetX, e.offsetY, 6, 0, Math.PI * 2);

    ctx.fill();
};

function clearCanvas() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    document.getElementById("result").innerText = "";
    document.getElementById("accuracy").innerText = "";
}

function predict() {
    let dataURL = canvas.toDataURL();

    fetch(dataURL)
        .then(res => res.blob())
        .then(blob => {
            let formData = new FormData();
            formData.append("file", blob);

            fetch("http://127.0.0.1:5000/predict", {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerText =
                    "Prediction: " + data.prediction;

                document.getElementById("accuracy").innerText =
                    "Model Accuracy: " + data.accuracy + "%";
            });
        });
}
</script>

</body>
</html>
